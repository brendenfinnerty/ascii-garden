name: Grow Garden

on:
  schedule:
    - cron: '0 */8 * * *'  # every 8 hours
  workflow_dispatch:  # manual trigger for testing

permissions:
  contents: write

jobs:
  grow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Grow the garden
        run: python garden.py

      - name: Commit and push
        run: |
          git config user.name "garden-bot"
          git config user.email "70029938+brendenfinnerty@users.noreply.github.com"
          git add README.md garden_state.json
          git commit -m "🌱 Day $(python -c 'import json; print(json.load(open("garden_state.json"))["day"])'): tend the garden"
          git push
